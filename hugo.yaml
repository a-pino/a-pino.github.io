baseURL: 'https://a-pino.github.io/'
languageCode: 'en-us'
title: 'Alexander Pino'
theme: 'PaperMod'

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 5

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Alexander Pino
  description: "Full-stack software engineer and AI developer"
  keywords: [Blog, Portfolio, Resume, AI, Software Engineering]
  author: Alexander Pino
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    disableHLJS: true

  label:
    text: "Alexander Pino"
    icon: /favicon.ico
    iconHeight: 35

  socialIcons:
    - name: github
      url: "https://github.com/a-pino"
    - name: linkedin
      url: "https://linkedin.com/in/alexander-j-pino"
    - name: email
      url: "mailto:alex.pino.salig@gmail.com"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: research
      name: Research
      url: /research/
      weight: 20
    - identifier: dev
      name: Dev
      url: /dev/
      weight: 30
    - identifier: resume
      name: Resume/CV
      url: /resume/
      weight: 40
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50
